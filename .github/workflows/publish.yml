name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build ${{ matrix.target }} on ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 (glibc + musl)
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_2
          # Linux armv7
          - os: ubuntu-latest
            target: armv7
            manylinux: auto
          # macOS Intel + Apple Silicon
          - os: macos-13
            target: x86_64
            manylinux: ""
          - os: macos-latest
            target: aarch64
            manylinux: ""
          # Windows x86_64 + i686
          - os: windows-latest
            target: x86_64
            manylinux: ""
          - os: windows-latest
            target: i686
            manylinux: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux || 'default' }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
