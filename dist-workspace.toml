[workspace]
# include the (workspace-excluded) basedpython dist crate so cargo-dist derives
# the release tag from basedpython's version (e.g. 0.0.1a1) rather than the ruff
# crate's. NOTE: validate on a dry-run — if `dist plan` can't resolve the
# excluded crate, fall back to `packages = ["ruff"]` (tag won't match the wheel)
members = ["cargo:.", "cargo:./crates/basedpython"]
packages = ["basedpython"]

# Config for 'dist'
[dist]
# We customize installation of `cargo-dist` in `release.yml` to avoid `curl | sh`
allow-dirty = ["ci"]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Whether to consider the binaries in a package for distribution (defaults true)
dist = false
# CI backends to support
ci = "github"
# basedpython publishes wheels only; no standalone-binary installers (they'd need
# the per-platform binary archives, which are dropped — see build-binaries.yml)
installers = []
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "aarch64-pc-windows-msvc",
    "arm-unknown-linux-musleabihf",
    "armv7-unknown-linux-gnueabihf",
    "armv7-unknown-linux-musleabihf",
    "x86_64-apple-darwin",
    "powerpc64-unknown-linux-gnu",
    "powerpc64le-unknown-linux-gnu",
    "riscv64gc-unknown-linux-gnu",
    "s390x-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
    "i686-unknown-linux-gnu",
    "i686-unknown-linux-musl",
    "i686-pc-windows-msvc"
]
# Whether to auto-include files like READMEs, LICENSEs, and CHANGELOGs (default true)
auto-includes = false
# Whether dist should create a Github Release or use an existing draft
create-release = true
# Which actions to run on pull requests
pr-run-mode = "plan"
# Whether CI should trigger releases with dispatches instead of tag pushes
dispatch-releases = true
# publish pre-releases (e.g. the semver alpha `0.0.1-a1`) to package managers.
# without this, cargo-dist's publish jobs skip themselves for any pre-release tag,
# which is why the 0.0.1-a1 release built successfully but never published
publish-prereleases = true
# Which phase dist should use to create the GitHub release
github-release = "announce"
# Whether to enable GitHub Attestations
github-attestations = true
# When to generate GitHub Attestations
github-attestations-phase = "announce"
# Patterns to attest when creating attestations for release artifacts
github-attestations-filters = ["*.json", "*.sh", "*.ps1", "*.zip", "*.tar.gz"]
# Whether CI should include auto-generated code to build local artifacts
build-local-artifacts = false
# docker dropped (it was wired to the old `ruff` binary); build-docker.yml is also
# gated to skip so this is consistent even before `release.yml` is regenerated
local-artifacts-jobs = ["./build-binaries", "./build-wasm"]
# Publish jobs to run in CI
publish-jobs = ["./publish-pypi", "./publish-wasm"]
# the upstream post-announce jobs are astral infra (docs / mirror / playground /
# versions) that don't apply to the fork; cleared (takes effect on `dist generate`)
post-announce-jobs = []
# Custom permissions for GitHub Jobs
github-custom-job-permissions = { "build-docker" = { packages = "write", contents = "read", id-token = "write", attestations = "write" }, "publish-wasm" = { contents = "read", id-token = "write", packages = "write" }, "publish-mirror" = { contents = "read" } }
# Whether to install an updater program
install-updater = false
# Path that installers should place binaries in
install-path = ["$XDG_BIN_HOME/", "$XDG_DATA_HOME/../bin", "~/.local/bin"]
# github releases only (the upstream "simple" hosting points at releases.astral.sh)
hosting = ["github"]

[dist.github-custom-runners]
# the cargo-dist orchestration jobs (plan / build-global-artifacts / host /
# announce) are lightweight and don't need depot's larger runners; the heavy
# per-platform wheel builds run in build-binaries.yml on standard runners. use
# github-hosted runners so the release works without a depot account
global = "ubuntu-latest"

[dist.github-action-commits]
"actions/checkout" = "de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
"actions/upload-artifact" = "bbbca2ddaa5d8feaa63e36b76fdaad77386f024f" # v7.0.0
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
"actions/attest-build-provenance" = "a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4.1.0
